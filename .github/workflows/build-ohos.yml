name: Build OHOS

on:
  push:
    branches: [ohos]
  pull_request:
    branches: [ohos]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "Release"
        type: choice
        options:
          - Release
          - Debug

env:
  CMAKE_BUILD_TYPE: ${{ github.event.inputs.build_type || 'Release' }}

jobs:
  build-ohos:
    name: Build Bun for OHOS (aarch64)
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup environment
        run: |
          # Add LLVM apt repository for clang-21
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-21 main" | sudo tee /etc/apt/sources.list.d/llvm-21.list
          sudo apt update
          sudo apt install -y \
            build-essential cmake ninja-build pkg-config \
            python3 curl wget unzip autoconf automake libtool \
            bison flex gperf gawk ruby ruby-dev \
            clang-21 lld-21 \
            qemu-user qemu-user-static \
            xz-utils
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Setup Rust target for OHOS
        run: |
          # Add aarch64-unknown-linux-ohos target for Rust (lolhtml needs it)
          rustup target add aarch64-unknown-linux-ohos
          rustup show

      - name: Install OHOS SDK
        uses: openharmony-rs/setup-ohos-sdk@v1.0.0
        with:
          version: "5.0.0"
          cache: true
          mirror: true

      - name: Generate source lists
        run: |
          # cmake/sources/*.txt files are .gitignored but required for CMake
          # They are generated by globbing source patterns
          mkdir -p cmake/sources
          bun run glob-sources

      - name: Setup vendor/zig
        run: |
          # vendor/zig is not tracked in git, must be downloaded for CI
          # Download prebuilt Zig from our release (same version as local: 0.15.2)
          mkdir -p vendor/zig
          cd vendor/zig
          wget -q "https://github.com/springmin/bun/releases/download/webkit-ohos-prebuilt/zig-x86_64-linux-0.15.2-custom.tar.xz" -O zig.tar.xz
          tar xf zig.tar.xz
          # Contents are already at root level
          rm -f zig.tar.xz
          chmod +x zig
          ./zig version
          ls -la lib/

      - name: Download prebuilt WebKit
        run: |
          # Download prebuilt WebKit from GitHub Release instead of building from source
          # This avoids C++20 compatibility issues between WebKit and OHOS SDK libc++
          # The tarball also includes ICU headers from vendor/icu-ohos
          mkdir -p vendor/WebKit/WebKitBuild
          wget -q -O /tmp/bun-webkit-ohos-aarch64-release.tar.gz \
            https://github.com/springmin/bun/releases/download/webkit-ohos-prebuilt/bun-webkit-ohos-aarch64-release.tar.gz
          tar xzf /tmp/bun-webkit-ohos-aarch64-release.tar.gz -C vendor/WebKit/WebKitBuild/

          # Fix: Move Release contents to correct location
          # The tarball has Release/lib and Release/JavaScriptCore, but we need them in WebKitBuild/
          if [ -d "vendor/WebKit/WebKitBuild/Release" ]; then
            cp -r vendor/WebKit/WebKitBuild/Release/* vendor/WebKit/WebKitBuild/
            rm -rf vendor/WebKit/WebKitBuild/Release
          fi

          # Extract ICU headers from the tarball (included as icu-headers/)
          # and copy to vendor/icu-ohos for the build
          if [ -d "vendor/WebKit/WebKitBuild/icu-headers" ]; then
            mkdir -p vendor/icu-ohos/include
            cp -r vendor/WebKit/WebKitBuild/icu-headers/unicode/* vendor/icu-ohos/include/unicode/ 2>/dev/null || \
            mv vendor/WebKit/WebKitBuild/icu-headers/unicode vendor/icu-ohos/include/
            echo "=== ICU headers extracted from WebKit tarball ==="
            ls -la vendor/icu-ohos/include/
          else
            echo "WARNING: ICU headers not found in WebKit tarball"
          fi

          # Check what we have
          echo "=== WebKitBuild directory ==="
          ls -la vendor/WebKit/WebKitBuild/
          echo "=== lib/ ==="
          ls -la vendor/WebKit/WebKitBuild/lib/ 2>/dev/null || echo "No lib"
          echo "=== JavaScriptCore ==="
          ls -la vendor/WebKit/WebKitBuild/JavaScriptCore/ 2>/dev/null || echo "No JavaScriptCore"
          echo "=== JavaScriptCore/PrivateHeaders ==="
          ls -la vendor/WebKit/WebKitBuild/JavaScriptCore/PrivateHeaders/ 2>/dev/null || echo "No PrivateHeaders"
          echo "=== JavaScriptCore/PrivateHeaders/JavaScriptCore ==="
          ls -la vendor/WebKit/WebKitBuild/JavaScriptCore/PrivateHeaders/JavaScriptCore/ 2>/dev/null | head -10
          echo "=== WTF ==="
          ls -la vendor/WebKit/WebKitBuild/WTF/ 2>/dev/null || echo "No WTF"

      - name: Setup vendor/icu-ohos
        run: |
          # vendor/icu-ohos is not tracked in git, must be set up for CI
          # OHOS SDK provides a single libicu.so, but WebKit cmake expects
          # separate ICU libraries (libicuuc.a, libicui18n.a, libicudata.a)
          # Create symlinks from the single libicu.so to satisfy cmake
          mkdir -p vendor/icu-ohos/lib
          SDK_NATIVE="${OHOS_SDK_NATIVE:-$HOME/setup-ohos-sdk/linux/native}"

          # Create symlinks for each expected ICU library
          OHOS_LIB="${SDK_NATIVE}/sysroot/usr/lib/aarch64-linux-ohos"
          cd vendor/icu-ohos/lib
          for lib in icuuc icui18n icudata; do
            if [ -f "${OHOS_LIB}/libicu.so" ]; then
              ln -sf "${OHOS_LIB}/libicu.so" "lib${lib}.a"
            fi
          done
          ls -la

      - name: Configure build
        run: |
          echo "=== ICU headers check ==="
          ls -la vendor/icu-ohos/include/unicode/ 2>/dev/null | head -20 || echo "No unicode dir"

          # Check if ustring.h exists
          if [ -f "vendor/icu-ohos/include/unicode/ustring.h" ]; then
            echo "ustring.h found!"
          else
            echo "ERROR: ustring.h NOT found in vendor/icu-ohos/include/unicode/"
          fi

          cmake -B build/ohos-release -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/ohos-aarch64.cmake \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DENABLE_LTO=ON \
            -DWEBKIT_PREBUILT=ON \
            -DWEBKIT_PATH=vendor/WebKit/WebKitBuild

      - name: Build Bun
        run: ninja -C build/ohos-release bun

      - name: Verify build
        run: |
          ls -lh build/ohos-release/bun
          file build/ohos-release/bun
          # Verify 4K alignment for HarmonyOS signing compatibility
          # UPX compression breaks 4K alignment, so we use LTO build directly
          readelf -lW build/ohos-release/bun | grep "LOAD"
          qemu-aarch64 build/ohos-release/bun --version
          qemu-aarch64 build/ohos-release/bun -e 'console.log("OHOS build OK!")'

      - name: Run tests
        run: |
          qemu-aarch64 build/ohos-release/bun test-ohos.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bun-ohos-aarch64-${{ env.CMAKE_BUILD_TYPE }}
          path: build/ohos-release/bun
          retention-days: 30

      - name: Create release package
        if: github.event_name == 'push' && github.ref == 'refs/heads/ohos'
        run: |
          mkdir -p bun-ohos-aarch64
          cp build/ohos-release/bun bun-ohos-aarch64/
          cp LICENSE bun-ohos-aarch64/
          tar czf bun-ohos-aarch64-${{ github.sha }}.tar.gz bun-ohos-aarch64/

      - name: Upload release package
        if: github.event_name == 'push' && github.ref == 'refs/heads/ohos'
        uses: actions/upload-artifact@v4
        with:
          name: bun-ohos-release-package
          path: bun-ohos-aarch64-${{ github.sha }}.tar.gz
          retention-days: 90
