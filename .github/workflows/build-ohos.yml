name: Build OHOS

on:
  push:
    branches: [ohos]
    paths-ignore:
      - "vendor/WebKit/**"
      - "vendor/icu-ohos/**"
      - ".github/ohos-patches/**"
      - "cmake/tools/SetupWebKit.cmake"
      - "cmake/targets/BuildBun.cmake"
      - "cmake/toolchains/ohos-aarch64.cmake"
      - ".github/workflows/build-webkit-ohos.yml"
      - "scripts/build/deps/webkit.ts"
  pull_request:
    branches: [ohos]
    paths-ignore:
      - "vendor/WebKit/**"
      - "vendor/icu-ohos/**"
      - ".github/ohos-patches/**"
      - "cmake/tools/SetupWebKit.cmake"
      - "cmake/targets/BuildBun.cmake"
      - "cmake/toolchains/ohos-aarch64.cmake"
      - ".github/workflows/build-webkit-ohos.yml"
      - "scripts/build/deps/webkit.ts"
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "Release"
        type: choice
        options:
          - Release
          - Debug

env:
  CMAKE_BUILD_TYPE: ${{ github.event.inputs.build_type || 'Release' }}

jobs:
  build-ohos:
    name: Build Bun for OHOS (aarch64)
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup environment
        run: |
          # Add LLVM apt repository for clang-21
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-21 main" | sudo tee /etc/apt/sources.list.d/llvm-21.list
          sudo apt update
          sudo apt install -y \
            build-essential cmake ninja-build pkg-config \
            python3 curl wget unzip autoconf automake libtool \
            bison flex gperf gawk ruby ruby-dev \
            clang-21 lld-21 \
            qemu-user qemu-user-static \
            xz-utils
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install OHOS SDK
        uses: openharmony-rs/setup-ohos-sdk@v1.0.0
        with:
          version: "6.0"
          cache: true
          mirror: true

      - name: Setup Rust target for OHOS
        run: |
          # Add aarch64-unknown-linux-ohos target for Rust (lolhtml needs it)
          rustup target add aarch64-unknown-linux-ohos

          # Configure Rust to use OHOS clang as the linker for cross-compilation
          # The OHOS SDK provides aarch64-unknown-linux-ohos-clang wrapper
          export OHOS_NDK_HOME="${OHOS_SDK_NATIVE:-$HOME/setup-ohos-sdk/linux}"
          export PATH="$OHOS_NDK_HOME/llvm/bin:$PATH"

          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_OHOS_LINKER=$OHOS_NDK_HOME/llvm/bin/aarch64-unknown-linux-ohos-clang" >> $GITHUB_ENV

          rustup show

      - name: Generate source lists
        run: |
          # cmake/sources/*.txt files are .gitignored but required for CMake
          # They are generated by globbing source patterns
          mkdir -p cmake/sources
          bun run glob-sources

      - name: Setup vendor/zig
        run: |
          # vendor/zig is not tracked in git, must be downloaded for CI
          # Download prebuilt Zig from our release (same version as local: 0.15.2)
          mkdir -p vendor/zig
          cd vendor/zig
          wget -q "https://github.com/springmin/bun/releases/download/webkit-ohos-prebuilt/zig-x86_64-linux-0.15.2-custom.tar.xz" -O zig.tar.xz
          tar xf zig.tar.xz
          # Contents are already at root level
          rm -f zig.tar.xz
          chmod +x zig
          ./zig version
          ls -la lib/

      - name: Download prebuilt WebKit
        run: |
          # Download prebuilt WebKit from GitHub Release instead of building from source
          # This avoids C++20 compatibility issues between WebKit and OHOS SDK libc++
          # The tarball also includes ICU headers from vendor/icu-ohos
          mkdir -p vendor/WebKit/WebKitBuild
          wget -q -O /tmp/webkit-ohos-aarch64-Release.tar.gz \
            https://github.com/springmin/bun/releases/download/webkit-ohos-prebuilt/webkit-ohos-aarch64-Release.tar.gz
          tar xzf /tmp/webkit-ohos-aarch64-Release.tar.gz -C vendor/WebKit/WebKitBuild/

          # Check what we have
          echo "=== WebKitBuild directory ==="
          ls -la vendor/WebKit/WebKitBuild/
          echo "=== WebKit lib directory ==="
          ls -la vendor/WebKit/WebKitBuild/lib/ 2>/dev/null || echo "No lib directory in WebKitBuild root"
          echo "=== JavaScriptCore headers ==="
          ls -la vendor/WebKit/WebKitBuild/Headers/JavaScriptCore/ 2>/dev/null | head -10
          echo "=== WTF headers ==="
          ls -la vendor/WebKit/WebKitBuild/Headers/WTF/ 2>/dev/null | head -10

      - name: Build ICU for OHOS
        run: |
          # Build ICU 75.1 static libraries from source with OHOS toolchain
          # This ensures reproducibility and matches WebKit requirements (ICU >= 70.1)
          cd vendor

          # Download ICU 75.1 source
          wget -q https://github.com/unicode-org/icu/releases/download/release-75-1/icu4c-75_1-src.tgz
          tar xzf icu4c-75_1-src.tgz
          rm icu4c-75_1-src.tgz

          # Build native tools first (required for cross-compilation)
          mkdir -p icu-build-native
          cd icu-build-native
          ../icu/source/configure \
            --prefix="$PWD/install" \
            --disable-shared \
            --enable-static \
            --disable-samples \
            --disable-tests \
            --disable-extras
          make -j$(nproc)
          make install
          cd ..

          # Cross-compile for OHOS
          mkdir -p icu-build-ohos
          cd icu-build-ohos

          OHOS_LLVM="$OHOS_SDK_NATIVE/llvm"
          export CC="$OHOS_LLVM/bin/aarch64-unknown-linux-ohos-clang"
          export CXX="$OHOS_LLVM/bin/aarch64-unknown-linux-ohos-clang++"
          export AR="$OHOS_LLVM/bin/llvm-ar"
          export RANLIB="$OHOS_LLVM/bin/llvm-ranlib"
          export CFLAGS="--target=aarch64-linux-ohos -fPIC -O2"
          export CXXFLAGS="--target=aarch64-linux-ohos -fPIC -O2 -std=c++17"

          # Note: ICU doesn't recognize 'ohos', use aarch64-linux-gnu as host
          ../icu/source/configure \
            --host=aarch64-linux-gnu \
            --prefix="$PWD/../icu-ohos" \
            --disable-shared \
            --enable-static \
            --disable-samples \
            --disable-tests \
            --disable-extras \
            --with-cross-build="$PWD/../icu-build-native" \
            ac_cv_func_memcpy=yes \
            ac_cv_func_memmove=yes \
            ac_cv_func_memset=yes

          make -j$(nproc)
          make install
          cd ..

          # Verify build
          echo "=== ICU 75.1 build complete ==="
          ls -lh icu-ohos/lib/*.a
          file icu-ohos/lib/libicuuc.a | head -1

          # Clean up build directories to save space
          rm -rf icu-build-native icu-build-ohos icu

      - name: Configure build
        run: |
          echo "=== ICU headers check ==="
          ls -la vendor/icu-ohos/include/unicode/ 2>/dev/null | head -20 || echo "No unicode dir"

          # Check if ustring.h exists
          if [ -f "vendor/icu-ohos/include/unicode/ustring.h" ]; then
            echo "ustring.h found!"
          else
            echo "ERROR: ustring.h NOT found in vendor/icu-ohos/include/unicode/"
          fi

          cmake -B build/ohos-release -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/ohos-aarch64.cmake \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DENABLE_LTO=ON \
            -DWEBKIT_PREBUILT=ON \
            -DWEBKIT_PATH=vendor/WebKit/WebKitBuild/Release

      - name: Build Bun
        run: ninja -C build/ohos-release bun

      - name: Verify build
        run: |
          ls -lh build/ohos-release/bun
          file build/ohos-release/bun
          # Verify 4K alignment for HarmonyOS signing compatibility
          # UPX compression breaks 4K alignment, so we use LTO build directly
          readelf -lW build/ohos-release/bun | grep "LOAD"
          qemu-aarch64 build/ohos-release/bun --version
          qemu-aarch64 build/ohos-release/bun -e 'console.log("OHOS build OK!")'

      - name: Run tests
        run: |
          qemu-aarch64 build/ohos-release/bun test-ohos.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bun-ohos-aarch64-${{ env.CMAKE_BUILD_TYPE }}
          path: build/ohos-release/bun
          retention-days: 30

      - name: Create release package
        if: github.event_name == 'push' && github.ref == 'refs/heads/ohos'
        run: |
          mkdir -p bun-ohos-aarch64
          cp build/ohos-release/bun bun-ohos-aarch64/
          cp LICENSE.md bun-ohos-aarch64/LICENSE 2>/dev/null || echo "LICENSE.md not found, skipping"
          tar czf bun-ohos-aarch64-${{ github.sha }}.tar.gz bun-ohos-aarch64/

      - name: Upload release package
        if: github.event_name == 'push' && github.ref == 'refs/heads/ohos'
        uses: actions/upload-artifact@v4
        with:
          name: bun-ohos-release-package
          path: bun-ohos-aarch64-${{ github.sha }}.tar.gz
          retention-days: 90
