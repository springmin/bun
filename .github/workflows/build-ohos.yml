name: Build OHOS

on:
  push:
    branches: [ohos]
  pull_request:
    branches: [ohos]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "Release"
        type: choice
        options:
          - Release
          - Debug

env:
  CMAKE_BUILD_TYPE: ${{ github.event.inputs.build_type || 'Release' }}

jobs:
  build-ohos:
    name: Build Bun for OHOS (aarch64)
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup environment
        run: |
          # Add LLVM apt repository for clang-21
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-21 main" | sudo tee /etc/apt/sources.list.d/llvm-21.list
          sudo apt update
          sudo apt install -y \
            build-essential cmake ninja-build pkg-config \
            python3 curl wget unzip autoconf automake libtool \
            bison flex gperf gawk ruby ruby-dev \
            clang-21 lld-21 \
            qemu-user qemu-user-static \
            xz-utils
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install OHOS SDK
        uses: openharmony-rs/setup-ohos-sdk@v1.0.0
        with:
          version: "5.0.0"
          cache: true
          mirror: true

      - name: Generate source lists
        run: |
          # cmake/sources/*.txt files are .gitignored but required for CMake
          # They are generated by globbing source patterns
          mkdir -p cmake/sources
          bun run glob-sources

      - name: Clone WebKit (required for OHOS local build)
        run: |
          # OHOS has no prebuilt WebKit, must build from source
          # vendor/WebKit is a separate repo not tracked in bun's git
          WEBKIT_VERSION="fc9f2fa7272fec64905df6a9c78e15d7912f14ca"
          git clone --depth 1 --branch autobuild-${WEBKIT_VERSION} \
            https://github.com/oven-sh/WebKit.git vendor/WebKit
          cd vendor/WebKit && git checkout ${WEBKIT_VERSION}

      - name: Setup vendor/icu-ohos
        run: |
          # vendor/icu-ohos is not tracked in git, must be set up for CI
          # OHOS SDK provides shared libicu.so, but WebKit cmake expects static .a files
          # Create .a symlinks to .so files (linker will handle this)
          mkdir -p vendor/icu-ohos/include
          mkdir -p vendor/icu-ohos/lib
          SDK_NATIVE="${OHOS_SDK_NATIVE:-$HOME/setup-ohos-sdk/linux/native}"

          # Copy ICU headers from sysroot
          if [ -d "${SDK_NATIVE}/sysroot/usr/include/unicode" ]; then
            cp -r "${SDK_NATIVE}/sysroot/usr/include/unicode" vendor/icu-ohos/include/
          fi

          # Create .a symlinks to .so (linker handles shared libs as static)
          OHOS_LIB="${SDK_NATIVE}/sysroot/usr/lib/aarch64-linux-ohos"
          cd vendor/icu-ohos/lib
          for lib in icuuc icui18n icudata; do
            if [ -f "${OHOS_LIB}/lib${lib}.so" ]; then
              ln -sf "${OHOS_LIB}/lib${lib}.so" "lib${lib}.a"
            fi
          done
          ls -la

      - name: Configure build
        run: |
          cmake -B build/ohos-release -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/ohos-aarch64.cmake \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DENABLE_LTO=ON

      - name: Build Bun
        run: ninja -C build/ohos-release bun

      - name: Verify build
        run: |
          ls -lh build/ohos-release/bun
          file build/ohos-release/bun
          # Verify 4K alignment for HarmonyOS signing compatibility
          # UPX compression breaks 4K alignment, so we use LTO build directly
          readelf -lW build/ohos-release/bun | grep "LOAD"
          qemu-aarch64 build/ohos-release/bun --version
          qemu-aarch64 build/ohos-release/bun -e 'console.log("OHOS build OK!")'

      - name: Run tests
        run: |
          qemu-aarch64 build/ohos-release/bun test-ohos.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bun-ohos-aarch64-${{ env.CMAKE_BUILD_TYPE }}
          path: build/ohos-release/bun
          retention-days: 30

      - name: Create release package
        if: github.event_name == 'push' && github.ref == 'refs/heads/ohos'
        run: |
          mkdir -p bun-ohos-aarch64
          cp build/ohos-release/bun bun-ohos-aarch64/
          cp LICENSE bun-ohos-aarch64/
          tar czf bun-ohos-aarch64-${{ github.sha }}.tar.gz bun-ohos-aarch64/

      - name: Upload release package
        if: github.event_name == 'push' && github.ref == 'refs/heads/ohos'
        uses: actions/upload-artifact@v4
        with:
          name: bun-ohos-release-package
          path: bun-ohos-aarch64-${{ github.sha }}.tar.gz
          retention-days: 90
