name: Build WebKit for OHOS

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "Release"
        type: choice
        options:
          - Release
          - Debug
  push:
    branches: [ohos]
  pull_request:
    branches: [ohos]

env:
  CMAKE_BUILD_TYPE: ${{ github.event.inputs.build_type || 'Release' }}

jobs:
  build-webkit-ohos:
    name: Build WebKit for OHOS (aarch64)
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup environment
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-21 main" | sudo tee /etc/apt/sources.list.d/llvm-21.list
          sudo apt update
          sudo apt install -y \
            build-essential cmake ninja-build pkg-config \
            python3 curl wget unzip autoconf automake libtool \
            bison flex gperf gawk ruby ruby-dev \
            clang-21 lld-21 libc++-21-dev libc++abi-21-dev \
            qemu-user qemu-user-static \
            xz-utils
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install OHOS SDK
        uses: openharmony-rs/setup-ohos-sdk@v1.0.0
        with:
          version: "6.0"
          cache: true
          mirror: true

      - name: Setup Rust target for OHOS
        run: |
          rustup target add aarch64-unknown-linux-ohos
          export OHOS_NDK_HOME="${OHOS_SDK_NATIVE:-$HOME/setup-ohos-sdk/linux}"
          export PATH="$OHOS_NDK_HOME/llvm/bin:$PATH"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_OHOS_LINKER=$OHOS_NDK_HOME/llvm/bin/aarch64-unknown-linux-ohos-clang" >> $GITHUB_ENV
          rustup show

      - name: Prepare vendor directory
        run: mkdir -p vendor

      - name: Build ICU for OHOS
        run: |
          set -euo pipefail

          cd vendor

          # Download ICU 75.1 source if not already present
          if [ ! -d "icu" ]; then
            echo "Downloading ICU 75.1 source..."
            wget -q https://github.com/unicode-org/icu/releases/download/release-75-1/icu4c-75_1-src.tgz
            tar xzf icu4c-75_1-src.tgz
            rm icu4c-75_1-src.tgz
          fi

          # === Stage 1: Native build (for tools) ===
          echo "=== Stage 1: Native ICU build (tools) ==="
          mkdir -p icu-build-native
          cd icu-build-native

          # Use runConfigureICU for proper platform setup
          # Allow tools to be built - they are needed for data generation in some ICU components
          # Disable extras (like uconv) which are not needed by WebKit and require tools
          ../icu/source/runConfigureICU Linux \
            --prefix="$PWD/install" \
            --disable-shared \
            --enable-static \
            --disable-samples \
            --disable-tests \
            --with-data-packaging=static

          make -j$(nproc)
          make install

          cd ..

          # === Stage 2: Cross-compile for OHOS aarch64 ===
          echo "=== Stage 2: Cross-compile ICU for OHOS ==="
          mkdir -p icu-build-ohos
          cd icu-build-ohos

          OHOS_LLVM="$OHOS_SDK_NATIVE/llvm"
          export CC="$OHOS_LLVM/bin/aarch64-unknown-linux-ohos-clang"
          export CXX="$OHOS_LLVM/bin/aarch64-unknown-linux-ohos-clang++"
          export AR="$OHOS_LLVM/bin/llvm-ar"
          export RANLIB="$OHOS_LLVM/bin/llvm-ranlib"
          export CFLAGS="--target=aarch64-linux-ohos -fPIC -O2"
          export CXXFLAGS="--target=aarch64-linux-ohos -fPIC -O2 -std=c++17"

          # Use runConfigureICU with cross-build reference
          # Important: Use 'Linux' platform with explicit host
          # Allow tools for data generation, disable extras to avoid uconv dependency
          ../icu/source/runConfigureICU Linux \
            --host=aarch64-linux-gnu \
            --with-cross-build="$PWD/../icu-build-native" \
            --prefix="$PWD/../icu-ohos" \
            --disable-shared \
            --enable-static \
            --disable-samples \
            --disable-tests \
            --with-data-packaging=static

          make -j$(nproc)
          make install

          cd ..

          # === Verification ===
          echo "=== ICU build verification ==="
          ls -lh icu-ohos/lib/
          echo "Required libraries:"
          for lib in libicudata.a libicui18n.a libicuuc.a libicuio.a libicutu.a; do
            if [ -f "icu-ohos/lib/$lib" ]; then
              echo "✓ $lib"
            else
              echo "✗ MISSING: $lib"
            fi
          done

          # Ensure headers are present for WebKit
          if [ ! -d "icu-ohos/include/unicode" ]; then
            echo "Copying ICU headers from source..."
            mkdir -p icu-ohos/include
            cp -r icu/source/include/* icu-ohos/include/
          fi

          # Clean up build directories to save space
          rm -rf icu-build-native icu-build-ohos icu

      - name: Setup vendor/zig
        run: |
          mkdir -p vendor/zig
          cd vendor/zig
          wget -q "https://github.com/springmin/bun/releases/download/webkit-ohos-prebuilt/zig-x86_64-linux-0.15.2-custom.tar.xz" -O zig.tar.xz
          tar xf zig.tar.xz
          rm -f zig.tar.xz
          chmod +x zig
          ./zig version
          ls -la lib/

      - name: Download WebKit source
        run: |
          # Use fixed commit for reproducibility and faster download (shallow fetch)
          WEBKIT_COMMIT="c2010c47d12c525d36adabe3a17b2eb6ec850960"
          if [ ! -d "vendor/WebKit/.git" ]; then
            echo "=== Downloading WebKit source at commit $WEBKIT_COMMIT ==="
            mkdir -p vendor/WebKit
            cd vendor/WebKit
            git init
            git remote add origin https://github.com/oven-sh/WebKit
            # Fetch only the specific commit (shallow)
            git fetch --depth=1 origin "${WEBKIT_COMMIT}"
            git checkout -q FETCH_HEAD
            echo "WebKit source checked out at: $(git rev-parse --short HEAD)"
          else
            echo "=== WebKit source already exists ==="
            cd vendor/WebKit
            CURRENT_COMMIT=$(git rev-parse --short HEAD)
            echo "Current commit: $CURRENT_COMMIT"
            if [ "$CURRENT_COMMIT" != "c2010c47d" ]; then
              echo "Updating to fixed commit..."
              git fetch --depth=1 origin "${WEBKIT_COMMIT}"
              git checkout -q FETCH_HEAD
            fi
          fi

          # Apply custom WebKit patches for OHOS
          echo "=== Applying custom WebKit patches ==="
          cp -f "$GITHUB_WORKSPACE/.github/ohos-patches/FindICU.cmake" "$GITHUB_WORKSPACE/vendor/WebKit/Source/cmake/"
          cp -f "$GITHUB_WORKSPACE/.github/ohos-patches/OptionsJSCOnly.cmake" "$GITHUB_WORKSPACE/vendor/WebKit/Source/cmake/"
          mkdir -p "$GITHUB_WORKSPACE/vendor/WebKit/Source"
          cp -r "$GITHUB_WORKSPACE/.github/ohos-patches/Source/"* "$GITHUB_WORKSPACE/vendor/WebKit/Source/"
          echo "Patches applied."

      - name: Build WebKit for OHOS
        run: |
          cd vendor
          export OHOS_SDK_NATIVE="${OHOS_SDK_NATIVE:-$HOME/setup-ohos-sdk/linux}"
          export ICU_ROOT="$PWD/icu-ohos"

          echo "=== Building WebKit for OHOS ==="
          echo "OHOS SDK: $OHOS_SDK_NATIVE"
          echo "ICU: $ICU_ROOT"

          bash build-webkit-ohos.sh

          echo "=== Build Complete ==="
          echo "Output:"
          ls -lh WebKitBuild/Release/lib/

      - name: Package WebKit prebuilt
        run: |
          cd vendor/WebKit/WebKitBuild/Release
          tar czf ../../../webkit-ohos-aarch64.tar.gz lib/ Headers/
          ls -lh ../../webkit-ohos-aarch64.tar.gz

      - name: Upload WebKit artifact
        uses: actions/upload-artifact@v4
        with:
          name: webkit-ohos-aarch64-${{ env.CMAKE_BUILD_TYPE }}
          path: vendor/WebKit/WebKitBuild/Release/../webkit-ohos-aarch64.tar.gz
          retention-days: 30

      - name: Create WebKit release
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/ohos')
        run: |
          cd vendor/WebKit/WebKitBuild/Release
          tar czf ../../webkit-ohos-aarch64-${{ env.CMAKE_BUILD_TYPE }}.tar.gz lib/ Headers/
          ls -lh ../../webkit-ohos-${{ env.CMAKE_BUILD_TYPE }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload WebKit release package
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/ohos')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: webkit-ohos-prebuilt
          files: vendor/WebKit/WebKitBuild/Release/../webkit-ohos-${{ env.CMAKE_BUILD_TYPE }}.tar.gz
          generate_release_notes: true
          name: WebKit OHOS Prebuilt ${{ env.CMAKE_BUILD_TYPE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
